<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animaciones y Transiciones</title>
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>
    <h1>Animaciones, Transiciones y Transformaciones</h1>

    <h2>1. Transiciones (hover)</h2>
    <div class="caja transicion">
        Pásame el mouse
    </div>

    <h2>2. Transformaciones (2D)</h2>
    <div class="contenedor-flex">
        <div class="caja rotar">Rotar (45deg)</div>
        <div class="caja escalar">Escalar (1.2)</div>
        <div class="caja trasladar">Trasladar (X, Y)</div>
    </div>

    <h2>3. Animaciones (@keyframes)</h2>
    <div class="caja animacion-infinita">
        Animación
    </div>

    <div class="caja rebote">
        Rebote
    </div>

</body>

</html>
