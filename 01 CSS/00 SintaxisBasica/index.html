<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Por defecto, poseemos dos formas de brindar estilos en html, configurandolo en el head o dentro de las etiquetas html con la etiqueta "style". 
    Lo ideal es que toda esta configuración sea aplicada en un archivo aparte
    -->
    <!-- 
    <style>

    </style> 
    -->

    <!-- Así vinculamos el html con el css -->
    <link rel="stylesheet" href="./styles/style.css">
    
</head>
<body>
    <!-- <p style="">Este texto es plano</p> -->
    
    <!-- Estos titulos reciben estilo del archivo css -->
    <h1>Este es el título</h1>
    <h2>Este es el segundo título</h2>

    <h1 style="color: green; background-color: violet;">Este estilo se aplica solo a esta etiqueta</h1>
</body>

</html>
