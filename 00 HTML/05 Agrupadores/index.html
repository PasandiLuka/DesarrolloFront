<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Forma de agrupar</h1>
    <hr>
    <!-- El div y el span son los principales agrupadores que hay, se diferencian en que el div es un agrupador en bloque (Ocupa todo lo ancho de la pantalla) mientras que el span es un agrupador de linea (Solamente ocupa la extensión de su contenido) -->
    <div>
        <h2>Titulo secundario</h2>
        <p>Este es el contendio deeste artículo</p>
        <img src="./assets/img/BobElConstructor.png" alt="Bob:3" width="300px">
        <br>
        <a href="https:/www.youtube.com" target="_blank">Youtube</a>
    </div>

    <span>
        <strong>La fecha del dia de hoy</strong> <em>20/12/2025</em>
    </span>


</body>
</html>
